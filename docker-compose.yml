services:
  postgres:
    image: postgres:16-alpine
    container_name: agromarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agromarket_fcvt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agromarket123
    ports:
      - "5433:5432"
    volumes:
      - agromarket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agromarket_postgres_data: